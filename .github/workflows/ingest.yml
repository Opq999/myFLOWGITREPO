name: Daily ingest

on:
  schedule:
    # 08:30 UTC = 09:30 WAT, daily, after the Gemini free-tier daily quota
    # reset (midnight US-Pacific), so the run always starts with fresh quota.
    - cron: '30 8 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Write everything to drafts only'
        type: boolean
        default: false
      backfill:
        description: 'Backfill mode (12-month windows)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Optional extra free-tier keys, each adds its own daily quota.
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          GEMINI_API_KEY_6: ${{ secrets.GEMINI_API_KEY_6 }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: >
          npx tsx pipeline/run.ts
          ${{ inputs.dry_run == true && '--dry-run' || '' }}
          ${{ inputs.backfill == true && '--backfill' || '' }}

      - name: Top up missing Nigerian use cases
        # Fills nigeriaUseCases into any published workflow still missing them
        # (new ones already get them at draft time; this catches quota-gap
        # stragglers). Idempotent, stops gracefully on quota, and can never break
        # the deploy, so failure is tolerated and changes ride the next commit.
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          GEMINI_API_KEY_6: ${{ secrets.GEMINI_API_KEY_6 }}
        run: npx tsx pipeline/backfill-usecases.ts

      - name: Commit new content
        id: commit
        # Rebase-and-retry push lives in one shared script so ingest + backfill
        # can never drift, and a concurrent push to main can never silently
        # drop a run's content again (see pipeline/commit-content.sh).
        run: |
          bash pipeline/commit-content.sh "content: daily ingest $(date -u +%F)"

      - name: Build and deploy to Cloudflare Pages
        env:
          # Accepts the common misspelling CLOUDFARE_API_TOKEN as a fallback.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || 'cdd1130f0f80aa74d5fdea5759eb9c29' }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN secret not set, skipping auto-deploy."
            exit 0
          fi
          npm run build
          npx wrangler pages deploy dist --project-name opqai --branch main

      - name: Check email config
        id: emailcfg
        env:
          PW: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: |
          if [ -n "$PW" ]; then echo "enabled=true" >> "$GITHUB_OUTPUT"; else echo "enabled=false" >> "$GITHUB_OUTPUT"; fi

      - name: Email update notification
        if: steps.emailcfg.outputs.enabled == 'true' && steps.commit.outputs.published != '0'
        uses: dawidd6/action-send-mail@611879133a9569642c41be66f4a323286e9b8a3b # v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: opeyemiolowosoke@gmail.com
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          to: opeyemiolowosoke@gmail.com
          from: OPQAI Pipeline <opeyemiolowosoke@gmail.com>
          subject: "OPQAI published ${{ steps.commit.outputs.published }} new workflow(s) today"
          body: |
            Your workflow library just grew.

            New workflows published today:
            ${{ steps.commit.outputs.titles }}

            See them live: https://opqai.solutions/workflows/
            Run details: https://github.com/Opq999/myFLOWGITREPO/actions

      # No-publish days are no longer silent: this alert fires so a broken source
      # or a dry run surfaces immediately instead of being discovered by hand.
      - name: Alert when nothing published
        if: steps.emailcfg.outputs.enabled == 'true' && steps.commit.outputs.published == '0'
        uses: dawidd6/action-send-mail@611879133a9569642c41be66f4a323286e9b8a3b # v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: opeyemiolowosoke@gmail.com
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          to: opeyemiolowosoke@gmail.com
          from: OPQAI Pipeline <opeyemiolowosoke@gmail.com>
          subject: "⚠️ OPQAI ingest published 0 new workflows today"
          body: |
            Today's ingest ran but published nothing new.

            This can be a genuinely dry day, or a broken source. The run's
            Summary shows the funnel (fetched / fresh / scored / published) and
            flags any source that failed to fetch:

            https://github.com/Opq999/myFLOWGITREPO/actions/workflows/ingest.yml

            Library: https://opqai.solutions/workflows/
