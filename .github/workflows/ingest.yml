name: Daily ingest

on:
  schedule:
    # 08:30 UTC = 09:30 WAT, daily — after the Gemini free-tier daily quota
    # reset (midnight US-Pacific), so the run always starts with fresh quota.
    - cron: '30 8 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Write everything to drafts only'
        type: boolean
        default: false
      backfill:
        description: 'Backfill mode (12-month windows)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Optional extra free-tier keys — each adds its own daily quota.
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          GEMINI_API_KEY_6: ${{ secrets.GEMINI_API_KEY_6 }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: >
          npx tsx pipeline/run.ts
          ${{ inputs.dry_run == true && '--dry-run' || '' }}
          ${{ inputs.backfill == true && '--backfill' || '' }}

      # Build BEFORE committing. The generated content is only ever committed,
      # pushed and deployed if it actually builds, so a single malformed draft
      # can never land on main or freeze the live site — the run just fails and
      # the next one starts clean. (Layer 2 backstop; the pipeline already
      # diverts non-compiling drafts away from the built collection.)
      - name: Build site
        run: npm run build

      - name: Commit new content
        id: commit
        run: |
          git config user.name "opqai-pipeline"
          git config user.email "actions@users.noreply.github.com"
          git add src/content pipeline/seen.json
          published=$(git diff --cached --name-only --diff-filter=A -- 'src/content/workflows/*.mdx' | wc -l)
          titles=$(git diff --cached --name-only --diff-filter=A -- 'src/content/workflows/*.mdx' | sed 's|src/content/workflows/||; s|\.mdx||' | head -25)
          if git diff --cached --quiet; then
            echo "No new content today."
            published=0
          else
            git commit -m "content: daily ingest $(date -u +%F)"
            git push
          fi
          echo "published=$published" >> "$GITHUB_OUTPUT"
          {
            echo "titles<<EOF"
            echo "$titles"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        env:
          # Accepts the common misspelling CLOUDFARE_API_TOKEN as a fallback.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: cdd1130f0f80aa74d5fdea5759eb9c29
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN secret not set — skipping auto-deploy."
            exit 0
          fi
          npx wrangler pages deploy dist --project-name opqai --branch main

      - name: Check email config
        id: emailcfg
        env:
          PW: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: |
          if [ -n "$PW" ]; then echo "enabled=true" >> "$GITHUB_OUTPUT"; else echo "enabled=false" >> "$GITHUB_OUTPUT"; fi

      - name: Email update notification
        if: steps.emailcfg.outputs.enabled == 'true' && steps.commit.outputs.published != '0'
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: opeyemiolowosoke@gmail.com
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          to: opeyemiolowosoke@gmail.com
          from: OPQAI Pipeline <opeyemiolowosoke@gmail.com>
          subject: "OPQAI published ${{ steps.commit.outputs.published }} new workflow(s) today"
          body: |
            Your workflow library just grew.

            New workflows published today:
            ${{ steps.commit.outputs.titles }}

            See them live: https://opqai.pages.dev/workflows/
            Run details: https://github.com/Opq999/myFLOWGITREPO/actions
